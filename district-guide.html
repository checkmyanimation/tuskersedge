<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>TuskersEdge | District Guide</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: { jungle: '#064E3B', jungleLight: '#0F766E', sunset: '#F59E0B' },
            fontFamily: {
              heading: ['"Playfair Display"', 'serif'],
              body: ['"Inter"', 'system-ui', 'sans-serif'],
            },
          },
        },
      };
    </script>
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Playfair+Display:wght@500;600;700&display=swap"
      rel="stylesheet"
    />
  </head>
  <body class="bg-slate-50 font-body text-slate-800">
    <header class="border-b border-slate-100 bg-white">
      <div class="mx-auto flex max-w-6xl items-center justify-between px-4 py-3 md:px-6">
        <a href="index.html" class="flex items-center gap-2">
          <div class="flex h-9 w-9 items-center justify-center rounded-full bg-jungle text-white font-heading text-xl">&#128024;</div>
          <div>
            <div class="font-heading text-xl tracking-wide text-jungle">TuskersEdge</div>
            <div class="text-xs text-slate-500">Curated Sri Lanka journeys</div>
          </div>
        </a>
        <a
          href="tours.html"
          class="rounded-full border border-slate-200 px-3 py-1.5 text-xs font-semibold text-slate-700 hover:bg-slate-100"
        >
          Back to Tours
        </a>
      </div>
    </header>

    <main class="mx-auto max-w-6xl px-4 py-8 md:px-6 md:py-10">
      <article class="overflow-hidden rounded-2xl bg-white shadow-sm ring-1 ring-slate-100">
        <div id="district-hero" class="h-56 bg-cover bg-center md:h-72"></div>
        <div class="p-5 md:p-7">
          <p class="text-xs font-semibold uppercase tracking-[0.3em] text-sunset">District Guide</p>
          <h1 id="district-title" class="mt-2 font-heading text-3xl text-jungle md:text-4xl"></h1>
          <p id="district-summary" class="mt-3 max-w-3xl text-sm text-slate-600 md:text-base"></p>

          <div class="mt-5 grid gap-3 md:grid-cols-3">
            <div class="rounded-xl bg-slate-50 p-4 ring-1 ring-slate-100">
              <p class="text-[0.68rem] font-semibold uppercase tracking-[0.2em] text-slate-500">Climate</p>
              <p id="district-climate" class="mt-1 text-sm font-semibold text-jungle"></p>
            </div>
            <div class="rounded-xl bg-slate-50 p-4 ring-1 ring-slate-100 md:col-span-2">
              <p class="text-[0.68rem] font-semibold uppercase tracking-[0.2em] text-slate-500">Weather Window</p>
              <p id="district-weather" class="mt-1 text-sm text-slate-700"></p>
            </div>
          </div>

          <div class="mt-6 grid gap-4 md:grid-cols-2">
            <div class="rounded-xl bg-white p-4 ring-1 ring-slate-100">
              <p class="text-[0.68rem] font-semibold uppercase tracking-[0.2em] text-slate-500">What You Can See</p>
              <ul id="district-highlights" class="mt-2 space-y-1 text-sm text-slate-700"></ul>
            </div>
            <div class="rounded-xl bg-white p-4 ring-1 ring-slate-100">
              <p class="text-[0.68rem] font-semibold uppercase tracking-[0.2em] text-slate-500">Best For</p>
              <p id="district-focus" class="mt-2 text-sm text-slate-700"></p>
            </div>
          </div>

          <div class="mt-6 rounded-xl bg-white p-4 ring-1 ring-slate-100 md:p-6">
            <p class="text-[0.68rem] font-semibold uppercase tracking-[0.2em] text-slate-500">Full Guide</p>
            <div id="district-article" class="prose prose-slate mt-3 max-w-none text-sm md:text-base"></div>
          </div>
        </div>
      </article>
    </main>

    <script src="js/districts.js"></script>
    <script>
      const params = new URLSearchParams(window.location.search);
      const raw = params.get('district') || 'colombo';
      const toKey = typeof window.normalizeDistrictKey === 'function'
        ? window.normalizeDistrictKey
        : (value) => String(value || '').toLowerCase();
      const key = toKey(raw);

      const fallbackGuide = (window.DISTRICT_GUIDES && (window.DISTRICT_GUIDES[key] || window.DISTRICT_GUIDES.colombo)) || {};

      function escapeHtml(value) {
        return String(value || '')
          .replace(/&/g, '&amp;')
          .replace(/</g, '&lt;')
          .replace(/>/g, '&gt;')
          .replace(/"/g, '&quot;')
          .replace(/'/g, '&#39;');
      }

      function defaultArticleHtml(guide) {
        const firstHighlight = (guide.highlights && guide.highlights[0]) || `${guide.name} town center`;
        const secondHighlight = (guide.highlights && guide.highlights[1]) || `local food spots`;
        const thirdHighlight = (guide.highlights && guide.highlights[2]) || `scenic viewpoints`;
        return `
          <h2>Why Visit ${escapeHtml(guide.name)}</h2>
          <p>${escapeHtml(guide.summary || '')}</p>
          <p>${escapeHtml(guide.name)} is ideal for travelers interested in ${escapeHtml(guide.focus || 'culture and nature')}. The district combines accessible highlights with flexible routing, so day plans can be adjusted around weather and pace.</p>
          <h3>Top Experiences</h3>
          <ul>
            <li>${escapeHtml(firstHighlight)}</li>
            <li>${escapeHtml(secondHighlight)}</li>
            <li>${escapeHtml(thirdHighlight)}</li>
          </ul>
          <h3>Climate & Best Time</h3>
          <p><strong>Climate:</strong> ${escapeHtml(guide.climate || '-')}</p>
          <p><strong>Weather window:</strong> ${escapeHtml(guide.weather || '-')}</p>
          <h3>Planning Notes</h3>
          <p>For a smoother trip, combine ${escapeHtml(guide.name)} with nearby districts that match the same weather window. Private transport gives better timing control for sunrise spots and wildlife activity hours.</p>
        `;
      }

      function stripScriptTags(html) {
        return String(html || '').replace(/<script[\s\S]*?>[\s\S]*?<\/script>/gi, '');
      }

      async function getCustomDistrictGuide(districtKey) {
        try {
          const res = await fetch('data/content.json', { cache: 'no-store' });
          if (!res.ok) return null;
          const data = await res.json();
          const custom = data && data.districtGuides ? data.districtGuides[districtKey] : null;
          return custom && typeof custom === 'object' ? custom : null;
        } catch (error) {
          return null;
        }
      }

      (async () => {
        const customGuide = await getCustomDistrictGuide(key);
        const guide = {
          ...fallbackGuide,
          ...(customGuide || {}),
          name: (customGuide && customGuide.name) || fallbackGuide.name || 'District',
          highlights: Array.isArray((customGuide && customGuide.highlights))
            ? customGuide.highlights
            : (Array.isArray(fallbackGuide.highlights) ? fallbackGuide.highlights : []),
        };

        document.title = `TuskersEdge | ${guide.name} Guide`;
        document.getElementById('district-title').textContent = guide.name || 'District';
        document.getElementById('district-summary').textContent = guide.summary || '';
        document.getElementById('district-climate').textContent = guide.climate || '-';
        document.getElementById('district-weather').textContent = guide.weather || '-';
        document.getElementById('district-focus').textContent = guide.focus || '-';
        document.getElementById('district-hero').style.backgroundImage = `url('${guide.image || 'images/1.jpeg'}')`;
        document.getElementById('district-highlights').innerHTML = (guide.highlights || [])
          .map((item) => `<li>- ${escapeHtml(item)}</li>`)
          .join('');

        const articleHtml = stripScriptTags(String(guide.articleHtml || '').trim());
        document.getElementById('district-article').innerHTML = articleHtml || defaultArticleHtml(guide);
      })();
    </script>
  </body>
</html>
